<!DOCTYPE html>
<html lang="ku" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot Kurdish</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f2f5; margin: 0; display: flex; flex-direction: column; height: 100vh; }
        #chat-window { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .message { margin: 10px 0; padding: 12px 16px; border-radius: 15px; max-width: 70%; line-height: 1.5; }
        .user { background-color: #0084ff; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .bot { background-color: #e4e6eb; color: black; align-self: flex-start; border-bottom-left-radius: 2px; }
        .input-area { background: white; padding: 20px; display: flex; box-shadow: 0 -2px 5px rgba(0,0,0,0.05); }
        input { flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 25px; outline: none; font-size: 16px; }
        button { background-color: #0084ff; color: white; border: none; padding: 0 25px; margin-right: 10px; border-radius: 25px; cursor: pointer; font-weight: bold; }
        button:hover { background-color: #0073e6; }
    </style>
</head>
<body>

<div id="chat-window"></div>
<div class="input-area">
    <input type="text" id="userInput" placeholder="چی بکەم بۆت؟...">
    <button onclick="askAI()">ناردن</button>
</div>

<script type="module">
    import { GoogleGenerativeAI } from "https://esm.run/@google/generative-ai";

    const API_KEY = "AIzaSyC04_c5G_xlZyhx5V0Dy2o7wuv7w8KrXFE";
    const genAI = new GoogleGenerativeAI(API_KEY);

    window.askAI = async function() {
        const input = document.getElementById('userInput');
        const window = document.getElementById('chat-window');
        const text = input.value.trim();
        
        if (!text) return;

        // نامەی تۆ
        window.innerHTML += `<div class="message user">${text}</div>`;
        input.value = '';
        window.scrollTop = window.scrollHeight;

        try {
            const model = genAI.getGenerativeModel({ model: "gemini-1.5-flash" });
            const result = await model.generateContent(text);
            const response = await result.response;
            const aiReply = response.text();

            // وەڵامی AI
            window.innerHTML += `<div class="message bot">${aiReply}</div>`;
        } catch (error) {
            window.innerHTML += `<div class="message bot" style="color: red;">ببورە، کێشەیەک هەیە: ${error.message}</div>`;
        }
        window.scrollTop = window.scrollHeight;
    }
</script>

</body>
</html>
